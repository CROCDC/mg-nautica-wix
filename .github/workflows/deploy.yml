name: Deploy

# GitHub Actions owns the deploy (plan §4.3): PR -> Vercel Preview, main -> Production.
# Inert until enabled: set repo variable DEPLOY_ENABLED=true and the three secrets
# VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID. Turn OFF Vercel's own Git deploys
# for this project so deploys happen only from here.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  deploy:
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Quality gate before any deploy.
      - run: npm run lint
      - run: npm run typecheck

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      # Vercel builds the app server-side (so the project's env vars —
      # NEXT_PUBLIC_WIX_CLIENT_ID — are present at build time). We do NOT use
      # --prebuilt: a CI-side build would inline an empty NEXT_PUBLIC_ value.

      # ── Production (push to main, or manual run) ──
      - name: Deploy production
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          url=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployed to production: $url" >> "$GITHUB_STEP_SUMMARY"

      # ── Preview (pull request) ──
      - name: Deploy preview
        if: github.event_name == 'pull_request'
        run: |
          url=$(vercel deploy --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "Preview: $url" >> "$GITHUB_STEP_SUMMARY"
